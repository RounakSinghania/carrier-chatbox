<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pizza Order</title>
  <style>
    body {
      font-family: Arial;
      background: #ffe6cc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 280px;
      text-align: center;
    }

    input, select {
      width: 100%;
      margin: 8px 0;
      padding: 8px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: orange;
      border: none;
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 10px;
      background: #f2f2f2;
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🍕 Pizza Order</h2>

  <input type="text" id="name" placeholder="Your Name">

  <select id="size">
    <option value="100">Small (₹100)</option>
    <option value="200">Medium (₹200)</option>
    <option value="300">Large (₹300)</option>
  </select>

  <input type="number" id="quantity" placeholder="Quantity">
  <h3>ADD ON'S</h3>
  <select id="addon1">
  <option value="50">Peri-Peri Fries (₹50)</option>
</select>

<select id="addon2">
  <option value="40">Coke (₹40)</option>
</select>

<select id="addon3">
  <option value="80">Burger (₹80)</option>
</select>

  <button onclick="calculateOrder()">Order Now</button>

  <div class="result" id="output"></div>
</div>
<script>
function calculateOrder() {
    let name = document.getElementById("name").value;
    let price = Number(document.getElementById("size").value);
    let quantity = Number(document.getElementById("quantity").value);

    let total = price * quantity;

    document.getElementById("output").innerHTML =
        "Hello " + name + "! <br>" +
        "Total Bill: ₹" + total;
}
</script>
